<!DOCTYPE html>
<html>
<head>
  <title>Platoon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:80px 20px;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    h2{
      font-weight:400;
      color:#cbd5f5;
    }

    .box{
      margin-top:50px;
      background:#1e293b;
      padding:40px;
      border-radius:10px;
      max-width:500px;
      margin-left:auto;
      margin-right:auto;
    }

    input{
      padding:12px;
      width:70%;
      border:none;
      border-radius:6px;
      margin-right:10px;
    }

    button{
      padding:12px 20px;
      background:#22c55e;
      border:none;
      border-radius:6px;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>Platoon</h1>
<h2>The modern shift trade platform for firefighters</h2>

<div class="box">

<p>Launching soon.</p>

<p>Join the early access list.</p>

<form action="https://formspree.io/f/xkoqjzdq" method="POST">

<input 
type="email" 
name="email" 
placeholder="email address"
required
>

<button type="submit">
Request Access
</button>

</form>

</div>

</body>
</html>
